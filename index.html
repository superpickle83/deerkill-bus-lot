<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bus Lot — Deerkill Day Camp</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d26;
    --surface2: #22263a;
    --border: #2e334d;
    --accent: #f5a623;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #e8eaf2;
    --muted: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 3px solid var(--accent);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.375rem; font-weight: 900;
    letter-spacing: 0.05em; text-transform: uppercase; line-height: 1;
  }
  .logo em { color: var(--accent); font-style: normal; }
  .date-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem; font-weight: 600;
    letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase;
  }
  .header-btns { display: flex; gap: 5px; align-items: center; }
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
    transition: background 0.3s;
  }
  .sync-dot.syncing { background: var(--accent); animation: pulse 0.8s infinite; }
  .sync-dot.ok      { background: var(--green); }
  .sync-dot.err     { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  button {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 0.9rem;
    letter-spacing: 0.07em; text-transform: uppercase;
    border: none; cursor: pointer;
    padding: 6px 10px; border-radius: 4px;
    transition: all 0.15s; touch-action: manipulation;
  }
  .btn-accent { background: var(--accent); color: #111; }
  .btn-accent:hover { background: #fbbf24; }
  .btn-ghost {
    background: transparent; color: var(--text);
    border: 1.5px solid var(--border);
    font-size: 1.0rem; padding: 4px 8px;
    border-radius: 4px; transition: all 0.15s;
  }
  .btn-lock {
    background: transparent; color: var(--text);
    border: 1.5px solid var(--border);
    font-size: 1.0rem; padding: 4px 8px;
    border-radius: 4px; transition: all 0.15s;
  }
  .btn-lock.locked {
    background: #1a2e1a;
    border-color: var(--green);
    box-shadow: 0 0 6px rgba(34,197,94,0.3);
  }

  /* TAB NAV */
  .tab-nav {
    display: flex;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
  }
  .tab-btn {
    flex: 1;
    padding: 9px 6px 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted);
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    border-radius: 0;
    cursor: pointer;
    transition: all 0.15s;
    touch-action: manipulation;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: rgba(245,166,35,0.05);
  }
  .tab-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem; font-weight: 900;
    background: var(--red); color: #fff;
    border-radius: 9px; padding: 1px 5px;
    min-width: 18px; text-align: center; line-height: 1.4;
    display: none;
  }
  .tab-badge.visible { display: inline-block; }

  /* PANELS */
  .panel { display: none; flex: 1; flex-direction: column; min-height: 0; overflow: hidden; }
  .panel.active { display: flex; }

  /* ── LOWER LOT (panel 1) ── */
  .map-area {
    flex: 1; overflow: auto; padding: 10px 8px 6px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    -webkit-overflow-scrolling: touch;
  }
  .stats-bar {
    display: flex; gap: 10px; align-items: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted);
  }
  .stat-val { color: var(--text); font-size: 1.125rem; font-weight: 900; }
  .stat-val.accent { color: var(--accent); }
  .stat-val.green  { color: var(--green); }
  .lot-wrap {
    background: #0b0d13;
    border: 1px solid #1e2235;
    border-radius: 10px;
    padding: 8px 10px 10px;
    display: inline-flex;
    flex-direction: column;
    gap: 0;
    align-items: stretch;
  }
  .lot-inner {
    display: flex;
    flex-direction: row;
    align-items: flex-end;
    gap: 0;
  }
  .wilder-label {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent); opacity: 0.7;
    white-space: nowrap; margin-right: 6px;
    align-self: center;
  }
  .lot-grid {
    display: flex;
    flex-direction: row;
    align-items: flex-end;
    gap: 5px;
  }
  .lot-col {
    display: flex;
    flex-direction: column-reverse;
    gap: 4px;
    align-items: center;
  }
  .col-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.675rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: #3a4060; text-align: center;
    padding-bottom: 3px;
    order: 999;
  }
  .lot-col.angled {
    margin-left: 8px;
    padding-left: 8px;
    border-left: 1px dashed #1e2438;
  }
  .lot-col.angled .spot {
    border-style: dashed;
    border-color: #2a3a4a;
    background: #0e1520;
    transform: skewY(-8deg);
  }
  .lot-col.angled .spot.filled {
    border-color: rgba(245,166,35,0.7);
    background: #1e1508;
  }
  .lot-col.angled .spot.filled .spot-bus-num { color: var(--accent); }
  .lot-col.angled .spot .spot-bus-num { transform: skewY(8deg); }
  .lot-col.angled .spot .spot-id      { transform: skewY(8deg); }
  .lot-col.angled .spot .spot-empty-icon { transform: skewY(8deg); }
  .lot-col.angled .spot .spot-empty-label { transform: skewY(8deg); }
  .row-labels {
    display: flex;
    flex-direction: column-reverse;
    gap: 4px;
    margin-right: 4px;
    align-items: flex-end;
  }
  .row-label-item {
    height: 56px;
    display: flex; align-items: center; justify-content: flex-end;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.665rem; font-weight: 700;
    color: #3a4060; padding-right: 4px;
    flex-shrink: 0;
  }
  .row-label-top { height: 20px; order: 999; }
  .col-aisle {
    width: 6px;
    display: flex; flex-direction: column-reverse;
    align-items: center; justify-content: space-evenly;
    gap: 3px; align-self: stretch;
    padding-bottom: 20px;
  }
  .aisle-dot { width: 2px; height: 2px; border-radius: 50%; background: #1e2438; flex-shrink: 0; }
  .entrance-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: #2a3350; text-align: center;
    margin-top: 6px; padding-top: 4px;
    border-top: 1px dashed #1a1f2e;
    width: 100%;
  }
  .spot {
    width: 56px; height: 56px;
    border-radius: 4px;
    border: 2px dashed #1e2438;
    background: #10131c;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
    transition: border-color 0.12s, background 0.12s, transform 0.1s;
    cursor: default; flex-shrink: 0;
    touch-action: none;
  }
  .spot.drag-over {
    border-color: var(--accent) !important;
    background: #29200e !important;
    transform: scale(1.08);
    border-style: solid;
  }
  .spot.filled {
    border: 2px solid rgba(34,197,94,0.5);
    background: #0d1e14; cursor: pointer;
  }
  .spot.filled:hover { border-color: rgba(239,68,68,0.6); background: #1c0d0d; }
  .spot:not(.filled):not(.drag-over):hover {
    border-color: rgba(245,166,35,0.3); background: #16150d;
  }
  .spot-id {
    position: absolute; top: 2px; left: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.495rem; font-weight: 700;
    letter-spacing: 0.04em; color: var(--muted); opacity: 0.4; line-height: 1;
  }
  .spot-bus-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.39rem; font-weight: 900;
    color: var(--green); line-height: 1;
  }
  .spot-empty-icon  { font-size: 0.79rem; opacity: 0.08; }
  .spot-empty-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.47rem; color: #222840; font-weight: 600;
  }
  .spot-remove {
    position: absolute; top: 2px; right: 3px;
    font-size: 0.495rem; color: var(--red);
    opacity: 0; transition: opacity 0.12s;
    font-weight: 700; font-family: 'Barlow Condensed', sans-serif;
  }
  .spot.filled:hover .spot-remove { opacity: 1; }
  .bus-tray {
    flex-shrink: 0; background: var(--surface);
    border-top: 2px solid var(--border);
    display: flex; flex-direction: column;
    max-height: 36vh;
    transition: max-height 0.4s ease;
  }
  .tray-header {
    padding: 5px 10px 4px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .tray-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.775rem; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
  }
  .tray-add { display: flex; gap: 4px; align-items: center; }
  input[type="text"] {
    font-family: 'Barlow', sans-serif; font-size: 0.9375rem;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 4px; padding: 4px 7px;
    width: 80px; outline: none; transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  .bus-chips {
    display: flex; flex-wrap: wrap; gap: 4px;
    padding: 7px 8px 32px 8px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .bus-chip {
    display: flex; align-items: center; gap: 3px;
    padding: 5px 10px; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--surface2);
    cursor: grab; user-select: none; touch-action: none;
    transition: all 0.12s; flex-shrink: 0;
  }
  .bus-chip:active { cursor: grabbing; transform: scale(0.95); }
  .bus-chip:hover:not(.placed) { border-color: var(--accent); }
  .bus-chip.placed  { opacity: 0.32; cursor: default; border-color: var(--green); }
  .bus-chip.dragging { opacity: 0.15; }
  .chip-num { font-family:'Barlow Condensed',sans-serif; font-size:1.1875rem; font-weight:900; color:var(--accent); line-height:1; }
  .chip-num.placed { color: var(--green); }
  .chip-dot { width:5px; height:5px; border-radius:50%; background:var(--muted); flex-shrink:0; }
  .chip-dot.ok { background: var(--green); }

  /* ── UPPER LOT (panel 2) ── */
  .upper-area {
    flex: 1; overflow-y: auto; padding: 12px 12px 24px;
    display: flex; flex-direction: column; gap: 16px;
    -webkit-overflow-scrolling: touch;
  }
  .upper-stats {
    display: flex; gap: 10px; align-items: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted);
    flex-shrink: 0;
  }
  .upper-section { display: flex; flex-direction: column; gap: 8px; }
  .upper-section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-count {
    font-size: 0.7rem; color: var(--muted);
    background: var(--surface2); border-radius: 10px;
    padding: 2px 8px; border: 1px solid var(--border);
  }
  .section-count.done { color: var(--green); border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.08); }
  .arrival-grid {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .arrival-card {
    width: 72px; height: 72px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--surface2);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
    cursor: pointer; touch-action: manipulation;
    transition: all 0.18s;
    user-select: none;
    position: relative;
    flex-shrink: 0;
  }
  .arrival-card:active { transform: scale(0.93); }
  .arrival-card:hover:not(.arrived) {
    border-color: rgba(245,166,35,0.5);
    background: #1c1a10;
  }
  .arrival-card.arrived {
    border-color: var(--green);
    background: #0d1e14;
    box-shadow: 0 0 10px rgba(34,197,94,0.18);
  }
  .arrival-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.5rem; font-weight: 900;
    color: var(--accent); line-height: 1;
  }
  .arrival-card.arrived .arrival-num { color: var(--green); }
  .arrival-check {
    font-size: 1.1rem; line-height: 1;
    opacity: 0;
    transition: opacity 0.18s;
  }
  .arrival-card.arrived .arrival-check { opacity: 1; }
  .arrival-pending {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.5rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); opacity: 0.5;
  }
  .arrival-card.arrived .arrival-pending { display: none; }

  /* Upper lot tray */
  .upper-tray {
    flex-shrink: 0; background: var(--surface);
    border-top: 2px solid var(--border);
    padding: 7px 10px 8px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
  }
  .upper-tray-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
  }

  /* ── OUTSTANDING (panel 3) ── */
  .outstanding-area {
    flex: 1; overflow-y: auto; padding: 12px 12px 24px;
    display: flex; flex-direction: column; gap: 14px;
    -webkit-overflow-scrolling: touch;
  }
  .outstanding-header {
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .outstanding-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
  }
  .outstanding-count {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.2rem; font-weight: 900;
    color: var(--red);
  }
  .outstanding-count.clear { color: var(--green); }
  .outstanding-empty {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; padding: 40px 20px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    text-align: center;
  }
  .outstanding-empty .icon { font-size: 2.5rem; opacity: 0.4; }
  .os-group { display: flex; flex-direction: column; gap: 8px; }
  .os-group-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
  }
  .os-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .os-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 20px;
    border: 1.5px solid rgba(239,68,68,0.35);
    background: rgba(239,68,68,0.07);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.2rem; font-weight: 900;
    color: var(--text);
  }
  .os-chip .os-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--red); flex-shrink: 0;
  }
  .os-refresh-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); opacity: 0.5;
    text-align: center; padding-top: 4px;
  }

  /* BANNER */
  .lot-banner {
    position: fixed;
    top: -120px;
    left: 0; right: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 18px;
    background: linear-gradient(135deg, #1a3a1a, #0f2a10);
    border-bottom: 3px solid var(--green);
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    transition: top 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .lot-banner.visible { top: 0; }
  .banner-text { display: flex; flex-direction: column; gap: 2px; }
  .banner-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.3rem; font-weight: 900;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--green); line-height: 1;
  }
  .banner-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(34,197,94,0.6);
  }
  .banner-dismiss {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--green); background: transparent;
    border: 1px solid rgba(34,197,94,0.4);
    border-radius: 4px; padding: 5px 10px;
    cursor: pointer; flex-shrink: 0;
    touch-action: manipulation;
  }
  .banner-dismiss:active { background: rgba(34,197,94,0.1); }

  /* OVERLAY */
  .overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.82); z-index:100;
    align-items:center; justify-content:center;
  }
  .overlay.open { display:flex; }
  .modal {
    background:var(--surface); border:1px solid var(--border);
    border-top:3px solid var(--accent); border-radius:8px;
    padding:18px 20px; width:360px; max-width:95vw; max-height:88vh;
    display:flex; flex-direction:column; gap:10px;
  }
  .modal h2 {
    font-family:'Barlow Condensed',sans-serif; font-size:1.3125rem; font-weight:900;
    letter-spacing:0.06em; text-transform:uppercase; color:var(--accent);
  }
  .modal-date {
    font-family:'Barlow Condensed',sans-serif; font-size:0.8125rem; font-weight:600;
    letter-spacing:0.1em; color:var(--muted); text-transform:uppercase; margin-top:-6px;
  }
  .share-list { overflow-y:auto; display:flex; flex-direction:column; gap:3px; flex:1; }
  .share-row {
    display:flex; align-items:center; gap:10px;
    padding:6px 10px; background:var(--surface2);
    border-radius:4px; border:1px solid rgba(34,197,94,0.2);
  }
  .share-spot {
    font-family:'Barlow Condensed',sans-serif; font-size:0.8125rem; font-weight:700;
    letter-spacing:0.08em; color:var(--muted); min-width:160px; text-transform:uppercase;
  }
  .share-bus { font-family:'Barlow Condensed',sans-serif; font-size:1.4375rem; font-weight:900; color:var(--accent); }
  .modal-btns { display:flex; gap:6px; justify-content:flex-end; }

  @media print {
    header,.bus-tray,.stats-bar,.overlay,.lot-banner,.tab-nav { display:none !important; }
    body { background:white; color:#111; height:auto; overflow:visible; }
    .map-area { padding:4px; overflow:visible; }
    .lot-wrap { background:white; border-color:#ccc; }
    .spot { border:1.5px solid #bbb; background:#f5f5f5; }
    .spot.filled { background:#eaf7ee; border:1.5px solid #6fcf97; }
    .spot-bus-num { color:#27ae60; }
    .spot-id { opacity:1; color:#aaa; }
    .wilder-label { color:#999; }
    .col-header,.row-label-item { color:#999; }
    .aisle-dot { background:#ddd; }
    .entrance-label { color:#bbb; border-color:#ddd; }
    .lot-col.angled .spot { transform:none; background:#f0f5f8; border-color:#9ab; }
    .lot-col.angled .spot .spot-bus-num,

  }
</style>
</head>

<script>
// ── Google Sheets config ────────────────────────────────
const SHEET_ID        = '1BVMJySQfWAeYEEVy_dQygc8GYNfcc5J_M-31TBcHog4';
const SHEET_TAB       = 'BusAssignments';
const UPPER_TAB       = 'UpperLotArrivals';
const SHEET_URL       = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_TAB)}`;
const UPPER_URL       = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(UPPER_TAB)}`;
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwW_AjyYQyyFz0c-ntjQay74xVcxQQU1mnI1CB5ep7bOKoS9GiUivr5vJ4sGkDbSzNy/exec';

// ── Lot layout ──────────────────────────────────────────
const COL_ROWS   = { 1:5, 2:6, 3:7, 4:8 };
const COL5_ROWS  = [1,2,3,4,5,6,7,8];
const ANGLED_COL = 5;
const MAX_ROWS   = 8;

function spotId(row, col) { return `R${row}-C${col}`; }

const ALL_SPOTS = [];
for (let col = 1; col <= 4; col++) {
  for (let row = 1; row <= COL_ROWS[col]; row++) ALL_SPOTS.push({ id: spotId(row, col), row, col });
}
COL5_ROWS.forEach(row => ALL_SPOTS.push({ id: spotId(row, 5), row, col: 5 }));
const SMAP        = {};
ALL_SPOTS.forEach(s => SMAP[s.id] = s);
const TOTAL_SPOTS = ALL_SPOTS.length; // 34

// ── Lower lot state ─────────────────────────────────────
let buses = [
  {id:1,num:'20'},{id:2,num:'21'},{id:3,num:'22'},{id:4,num:'23'},
  {id:5,num:'24'},{id:6,num:'25'},{id:7,num:'26'},{id:8,num:'27'},
  {id:9,num:'28'},{id:10,num:'29'},{id:11,num:'30'},{id:12,num:'31'},
  {id:13,num:'32'},{id:14,num:'33'},{id:15,num:'34'},{id:16,num:'35'},
  {id:17,num:'40'},{id:18,num:'41'},{id:19,num:'42'},{id:20,num:'43'},
  {id:21,num:'44'},{id:22,num:'45'},{id:23,num:'46'},{id:24,num:'47'},
  {id:25,num:'48'},{id:26,num:'49'},{id:27,num:'51'},{id:28,num:'52'},
  {id:29,num:'80'},{id:30,num:'81'},
];
let nextId      = 31;
let assignments = {}; // spotId → busNum
let dragBusNum  = null;
let dragFromSpot = null;
let saveTimer   = null;
let isSaving    = false;
let locked      = false;

// ── Upper lot state ─────────────────────────────────────
// Default: Hoboken 60-70, NYC 1-8. Group tracked by number.
let upperBuses = [
  // Hoboken
  {num:'60',group:'hoboken'},{num:'61',group:'hoboken'},{num:'62',group:'hoboken'},
  {num:'63',group:'hoboken'},{num:'64',group:'hoboken'},{num:'65',group:'hoboken'},
  {num:'66',group:'hoboken'},{num:'67',group:'hoboken'},{num:'68',group:'hoboken'},
  {num:'69',group:'hoboken'},{num:'70',group:'hoboken'},
  // NYC
  {num:'1',group:'nyc'},{num:'2',group:'nyc'},{num:'3',group:'nyc'},{num:'4',group:'nyc'},
  {num:'5',group:'nyc'},{num:'6',group:'nyc'},{num:'7',group:'nyc'},{num:'8',group:'nyc'},
];
let upperArrivals = new Set(); // set of bus nums that have arrived
let upperSaveTimer = null;
let isUpperSaving  = false;

// ── Active tab ──────────────────────────────────────────
let activeTab = 'lower';

// ── Date ────────────────────────────────────────────────
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const now    = new Date();
const dateStr = `${DAYS[now.getDay()]} · ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
document.getElementById('dateBadge').textContent  = dateStr;
document.getElementById('modalDate').textContent  = dateStr;

// ── Tab switching ────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'outstanding') renderOutstanding();
  // Hide share / lock buttons when not on lower lot
  document.getElementById('lockBtn').style.display  = tab === 'lower' ? '' : 'none';
  document.querySelector('button[onclick="openShare()"]').style.display = tab === 'lower' ? '' : 'none';
}

// ── Sync dot ─────────────────────────────────────────────
function setSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (status !== 'idle' ? ' ' + status : '');
  dot.title = {ok:'Saved', err:'Save failed', syncing:'Saving…', idle:'Ready'}[status] || 'Ready';
}

// ══════════════════════════════════════════════════════════
// ── LOWER LOT — Load / Save ───────────────────────────────
// ══════════════════════════════════════════════════════════
async function loadFromSheet(isInitialLoad = false) {
  if (isSaving) return;
  try {
    const res  = await fetch(SHEET_URL + '&cachebust=' + Date.now());
    const text = await res.text();
    const rows = text.trim().split('\n').slice(1);
    const loaded = {};
    rows.forEach(line => {
      const cols = line.split(',').map(c => c.replace(/^"|"$/g,'').trim());
      if (cols[0] && cols[1] && cols[0] !== 'bus_number') loaded[cols[1]] = cols[0];
    });
    const loadedCount = Object.keys(loaded).length;
    const localCount  = Object.keys(assignments).length;
    if (isInitialLoad || loadedCount >= localCount) {
      assignments = loaded;
      if (!locked) { renderGrid(); renderChips(); checkCompletion(); }
    }
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('err'); console.error('Load error:', e); }
}

async function saveToSheet() {
  if (!APPS_SCRIPT_URL) { setSyncStatus('err'); return; }
  isSaving = true; setSyncStatus('syncing');
  try {
    const rows = [['bus_number','spot_id']];
    Object.keys(assignments)
      .map(sid => ({ sid, busNum: assignments[sid] }))
      .sort((a,b) => parseInt(a.busNum) - parseInt(b.busNum))
      .forEach(({ sid, busNum }) => rows.push([busNum, sid]));
    await fetch(APPS_SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ sheetId: SHEET_ID, tab: SHEET_TAB, rows })
    });
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('err'); console.error('Save error:', e); }
  finally { isSaving = false; }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  if (!APPS_SCRIPT_URL) { setSyncStatus('err'); return; }
  saveTimer = setTimeout(saveToSheet, 800);
}

// ══════════════════════════════════════════════════════════
// ── UPPER LOT — Load / Save ───────────────────────────────
// ══════════════════════════════════════════════════════════
async function loadUpperFromSheet(isInitialLoad = false) {
  if (isUpperSaving) return;
  try {
    const res  = await fetch(UPPER_URL + '&cachebust=' + Date.now());
    const text = await res.text();
    const rows = text.trim().split('\n').slice(1);
    const loaded = new Set();
    rows.forEach(line => {
      const cols = line.split(',').map(c => c.replace(/^"|"$/g,'').trim());
      // Columns: bus_number, arrived (TRUE/timestamp)
      if (cols[0] && cols[1] && cols[0] !== 'bus_number') {
        const arrived = cols[1].toUpperCase() === 'TRUE' || cols[1] !== '' && cols[1] !== 'FALSE';
        if (arrived) loaded.add(cols[0]);
      }
    });
    // Also merge in any buses listed that aren't already in our upperBuses list
    rows.forEach(line => {
      const cols = line.split(',').map(c => c.replace(/^"|"$/g,'').trim());
      if (cols[0] && cols[0] !== 'bus_number') {
        const num = cols[0];
        if (!upperBuses.find(b => b.num === num)) {
          // Default unknown buses to 'other' group shown at bottom of hoboken for now
          upperBuses.push({ num, group: 'hoboken' });
        }
      }
    });
    if (isInitialLoad || loaded.size >= upperArrivals.size) {
      upperArrivals = loaded;
      renderUpperLot();
    }
  } catch(e) { console.error('Upper load error:', e); }
}

async function saveUpperToSheet() {
  if (!APPS_SCRIPT_URL) return;
  isUpperSaving = true; setSyncStatus('syncing');
  try {
    const rows = [['bus_number','arrived']];
    upperBuses.forEach(b => {
      rows.push([b.num, upperArrivals.has(b.num) ? 'TRUE' : 'FALSE']);
    });
    await fetch(APPS_SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ sheetId: SHEET_ID, tab: UPPER_TAB, rows })
    });
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('err'); console.error('Upper save error:', e); }
  finally { isUpperSaving = false; }
}

function scheduleUpperSave() {
  clearTimeout(upperSaveTimer);
  upperSaveTimer = setTimeout(saveUpperToSheet, 800);
}

// ══════════════════════════════════════════════════════════
// ── LOWER LOT — Render ────────────────────────────────────
// ══════════════════════════════════════════════════════════
function renderGrid() {
  const wrap = document.getElementById('lotWrap');
  wrap.innerHTML = '';
  const inner = document.createElement('div');
  inner.className = 'lot-inner';
  const wl = document.createElement('div');
  wl.className = 'wilder-label';
  wl.textContent = '◄ Wilder Road';
  inner.appendChild(wl);
  const rlCol = document.createElement('div');
  rlCol.className = 'row-labels';
  const rlt = document.createElement('div');
  rlt.className = 'row-label-top';
  rlCol.appendChild(rlt);
  for (let r = 1; r <= MAX_ROWS; r++) {
    const rli = document.createElement('div');
    rli.className = 'row-label-item';
    rli.textContent = `R${r}`;
    rlCol.appendChild(rli);
  }
  inner.appendChild(rlCol);
  const grid = document.createElement('div');
  grid.className = 'lot-grid';
  for (let col = 1; col <= 5; col++) {
    if (col > 1) {
      const aisle = document.createElement('div');
      aisle.className = 'col-aisle';
      for (let i = 0; i < 14; i++) {
        const d = document.createElement('div'); d.className = 'aisle-dot'; aisle.appendChild(d);
      }
      grid.appendChild(aisle);
    }
    const colEl = document.createElement('div');
    colEl.className = 'lot-col' + (col === ANGLED_COL ? ' angled' : '');
    const ch = document.createElement('div');
    ch.className = 'col-header';
    ch.textContent = col === ANGLED_COL ? 'C5' : `C${col}`;
    colEl.appendChild(ch);
    if (col === ANGLED_COL) {
      for (let row = 1; row <= MAX_ROWS; row++) colEl.appendChild(makeSpot(spotId(row, col)));
    } else {
      const maxRow = COL_ROWS[col];
      for (let row = 1; row <= maxRow; row++) colEl.appendChild(makeSpot(spotId(row, col)));
      if (col < 4) {
        for (let r = maxRow + 1; r <= MAX_ROWS; r++) {
          const ph = document.createElement('div');
          ph.style.cssText = 'width:56px;height:56px;flex-shrink:0;visibility:hidden;';
          colEl.appendChild(ph);
        }
      }
    }
    grid.appendChild(colEl);
  }
  inner.appendChild(grid);
  wrap.appendChild(inner);
  const el = document.createElement('div');
  el.className = 'entrance-label';
  el.textContent = '▼  Happiness Hill Entrance  ▼';
  wrap.appendChild(el);
}

function makeSpot(sid) {
  const busNum = assignments[sid];
  const el     = document.createElement('div');
  el.className = 'spot' + (busNum ? ' filled' : '');
  el.dataset.spotId = sid;
  if (busNum) {
    el.draggable = !locked;
    el.innerHTML = `<div class="spot-id">${sid}</div><div class="spot-bus-num">${busNum}</div><div class="spot-remove">✕</div>`;
    el.querySelector('.spot-remove').addEventListener('click', e => { e.stopPropagation(); if (!locked) removeSpot(sid); });
    if (!locked) {
      el.addEventListener('dragstart', e => {
        dragBusNum = busNum; dragFromSpot = sid;
        e.dataTransfer.effectAllowed = 'move';
        setTimeout(() => el.style.opacity = '0.2', 0);
      });
      el.addEventListener('dragend', () => el.style.opacity = '');
    }
  } else {
    el.innerHTML = `<div class="spot-id">${sid}</div><div class="spot-empty-icon">🚌</div><div class="spot-empty-label">Empty</div>`;
  }
  if (!locked) {
    el.addEventListener('dragover',  e => { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => { e.preventDefault(); el.classList.remove('drag-over'); if (dragBusNum) doAssign(dragBusNum, sid); });
    el.addEventListener('touchstart', onSpotTouchStart, {passive:false});
  }
  return el;
}

function doAssign(busNum, toSpot) {
  Object.keys(assignments).forEach(k => { if (assignments[k] === busNum) delete assignments[k]; });
  const displaced = assignments[toSpot];
  if (displaced && dragFromSpot) assignments[dragFromSpot] = displaced;
  else if (displaced) delete assignments[toSpot];
  assignments[toSpot] = busNum;
  dragBusNum = null; dragFromSpot = null;
  renderGrid(); renderChips();
  scheduleSave(); resetPollTimer(); checkCompletion();
  updateOutstandingBadge();
}

function removeSpot(sid) {
  if (locked) return;
  delete assignments[sid];
  renderGrid(); renderChips();
  scheduleSave();
  updateOutstandingBadge();
}

// Touch drag
let touchGhost = null, touchBusNum = null, touchFromSpot = null;

function onSpotTouchStart(e) {
  const spot = e.currentTarget;
  const sid  = spot.dataset.spotId;
  const bNum = assignments[sid];
  if (!bNum) return;
  e.preventDefault();
  touchBusNum = bNum; touchFromSpot = sid;
  spawnGhost(e.touches[0], bNum);
  document.addEventListener('touchmove', onGlobalTouchMove, {passive:false});
  document.addEventListener('touchend',  onGlobalTouchEnd,  {passive:false});
}
function spawnGhost(touch, label) {
  const g = document.createElement('div');
  g.id = 'touchGhost'; g.textContent = label;
  g.style.cssText = `position:fixed;z-index:9999;pointer-events:none;
    font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.3rem;
    color:#111;background:var(--accent);border-radius:18px;
    padding:5px 13px;opacity:0.92;transform:translate(-50%,-50%);
    left:${touch.clientX}px;top:${touch.clientY}px;
    box-shadow:0 4px 14px rgba(0,0,0,0.55);`;
  document.body.appendChild(g);
  touchGhost = g;
}
function onGlobalTouchMove(e) {
  if (!touchGhost) return; e.preventDefault();
  const t = e.touches[0];
  touchGhost.style.left = t.clientX + 'px'; touchGhost.style.top = t.clientY + 'px';
  document.querySelectorAll('.spot.drag-over').forEach(el => el.classList.remove('drag-over'));
  const under = document.elementFromPoint(t.clientX, t.clientY);
  const spotEl = under ? under.closest('.spot') : null;
  if (spotEl) spotEl.classList.add('drag-over');
}
function onGlobalTouchEnd(e) {
  document.removeEventListener('touchmove', onGlobalTouchMove);
  document.removeEventListener('touchend',  onGlobalTouchEnd);
  if (touchGhost) { touchGhost.remove(); touchGhost = null; }
  document.querySelectorAll('.spot.drag-over').forEach(el => el.classList.remove('drag-over'));
  const t = e.changedTouches[0];
  const under  = document.elementFromPoint(t.clientX, t.clientY);
  const spotEl = under ? under.closest('.spot') : null;
  if (spotEl && touchBusNum) {
    dragBusNum = touchBusNum; dragFromSpot = touchFromSpot;
    doAssign(touchBusNum, spotEl.dataset.spotId);
  }
  touchBusNum = null; touchFromSpot = null;
}

function renderChips() {
  const placed = new Set(Object.values(assignments));
  const chips  = document.getElementById('busChips');
  chips.innerHTML = '';
  buses.forEach(b => {
    if (placed.has(b.num)) return;
    const chip = document.createElement('div');
    chip.className = 'bus-chip';
    chip.innerHTML = `<div class="chip-num">${b.num}</div><div class="chip-dot"></div>`;
    chip.draggable = true;
    chip.addEventListener('dragstart', e => { dragBusNum = b.num; dragFromSpot = null; chip.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
    chip.addEventListener('touchstart', e => {
      e.preventDefault(); touchBusNum = b.num; touchFromSpot = null;
      spawnGhost(e.touches[0], b.num);
      document.addEventListener('touchmove', onGlobalTouchMove, {passive:false});
      document.addEventListener('touchend',  onGlobalTouchEnd,  {passive:false});
    }, {passive:false});
    chips.appendChild(chip);
  });
  updateStats(); updateTrayTitle(); updateTraySize();
}

function updateTrayTitle() {
  const unplaced = document.getElementById('busChips').children.length;
  document.getElementById('trayTitle').textContent =
    unplaced === 0 ? '✓ All buses assigned' : `${unplaced} to place`;
}

function updateTraySize() {
  const unplaced = document.getElementById('busChips').children.length;
  const tray     = document.getElementById('busTray');
  const header   = 38;
  if (unplaced === 0) {
    tray.style.maxHeight = header + 'px';
  } else {
    const chipsEl   = document.getElementById('busChips');
    const padded    = chipsEl.scrollHeight + header + 16;
    const maxPixels = Math.round(window.innerHeight * 0.36);
    tray.style.maxHeight = Math.min(padded, maxPixels) + 'px';
  }
}

function updateStats() {
  const placed = Object.keys(assignments).length;
  document.getElementById('statPlaced').textContent = placed;
  document.getElementById('statOpen').textContent   = TOTAL_SPOTS - placed;
}

function addBus() {
  const num = document.getElementById('addNum').value.trim();
  if (!num) return;
  if (!buses.find(b => b.num === num)) buses.push({id: nextId++, num});
  document.getElementById('addNum').value = '';
  renderChips(); updateOutstandingBadge();
}
document.getElementById('addNum').addEventListener('keydown', e => { if(e.key==='Enter') addBus(); });

// ── Lock ─────────────────────────────────────────────────
function toggleLock() {
  locked = !locked;
  const btn = document.getElementById('lockBtn');
  btn.textContent = locked ? '🔒' : '🔓';
  btn.classList.toggle('locked', locked);
  btn.title = locked ? 'Locked — tap to unlock' : 'Unlocked — tap to lock';
  document.getElementById('busChips').style.opacity       = locked ? '0.35' : '1';
  document.getElementById('busChips').style.pointerEvents = locked ? 'none' : '';
  document.querySelector('.tray-add').style.opacity       = locked ? '0.35' : '1';
  document.querySelector('.tray-add').style.pointerEvents = locked ? 'none' : '';
  renderGrid();
  if (locked) clearTimeout(pollTimer);
  else resetPollTimer();
}

// ── Banner ────────────────────────────────────────────────
let bannerDismissed = false;
function checkCompletion() {
  const placed   = Object.keys(assignments).length;
  const allDone  = buses.length > 0 && placed >= buses.length;
  if (allDone && !bannerDismissed) showBanner();
  else if (!allDone) { hideBanner(); bannerDismissed = false; }
}
function showBanner() {
  document.getElementById('bannerSub').textContent = `All ${buses.length} buses assigned · ${dateStr}`;
  document.getElementById('lotBanner').classList.add('visible');
  if (navigator.vibrate) navigator.vibrate([100,50,100]);
}
function hideBanner()    { document.getElementById('lotBanner').classList.remove('visible'); }
function dismissBanner() { bannerDismissed = true; hideBanner(); }

// ── Manual refresh ────────────────────────────────────────
async function manualRefresh() {
  const btn = document.querySelector('button[onclick="manualRefresh()"]');
  btn.style.transform = 'rotate(360deg)'; btn.style.transition = 'transform 0.5s ease';
  setTimeout(() => { btn.style.transform = ''; btn.style.transition = ''; }, 500);
  await Promise.all([loadFromSheet(true), loadUpperFromSheet(true)]);
  checkCompletion(); updateOutstandingBadge();
  if (activeTab === 'outstanding') renderOutstanding();
}

// ── Share / Copy ──────────────────────────────────────────
function ordinal(n) {
  const s = ['th','st','nd','rd'], v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}
function friendlySpot(sid, currentAssignments) {
  const match = sid.match(/R(\d+)-C(\d+)/);
  if (!match) return sid;
  const row = parseInt(match[1]), col = parseInt(match[2]);
  if (col === 5) {
    const filledCol5Rows = Object.keys(currentAssignments)
      .filter(s => s.endsWith('-C5'))
      .map(s => parseInt(s.match(/R(\d+)/)[1]))
      .sort((a,b) => a-b);
    const rank = filledCol5Rows.indexOf(row) + 1;
    return `${ordinal(rank)} Crooked Bus`;
  }
  return `${ordinal(row)} Row — ${ordinal(col)} Bus`;
}
function openShare() {
  const list = document.getElementById('shareList');
  list.innerHTML = '';
  const entries = Object.keys(assignments)
    .map(sid => ({ sid, busNum: assignments[sid] }))
    .sort((a,b) => parseInt(a.busNum) - parseInt(b.busNum));
  if (!entries.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:0.8rem;padding:8px 0">No buses assigned yet.</div>';
  } else {
    entries.forEach(({ sid, busNum }) => {
      const isAngled = sid.endsWith('-C5');
      const div = document.createElement('div');
      div.className = 'share-row';
      div.innerHTML = `<div class="share-bus" style="${isAngled ? 'color:var(--accent)' : ''}">${busNum}</div>
        <div class="share-spot" style="${isAngled ? 'color:var(--accent)' : ''}">${friendlySpot(sid, assignments)}</div>`;
      list.appendChild(div);
    });
  }
  document.getElementById('overlay').classList.add('open');
}
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
});
function copyList() {
  const lines = [`BUS ASSIGNMENTS — ${dateStr}`, '─────────────────────'];
  Object.keys(assignments)
    .map(sid => ({ sid, busNum: assignments[sid] }))
    .sort((a,b) => parseInt(a.busNum) - parseInt(b.busNum))
    .forEach(({ sid, busNum }) => lines.push(`Bus ${busNum}:  ${friendlySpot(sid, assignments)}`));
  navigator.clipboard.writeText(lines.join('\n'))
    .then(()=>alert('✓ Copied!')).catch(()=>alert('Copy failed.'));
}

// ══════════════════════════════════════════════════════════
// ── UPPER LOT — Render ────────────────────────────────────
// ══════════════════════════════════════════════════════════
function renderUpperLot() {
  const hobokenBuses = upperBuses.filter(b => b.group === 'hoboken');
  const nycBuses     = upperBuses.filter(b => b.group === 'nyc');

  renderArrivalGrid('hobokenGrid', hobokenBuses);
  renderArrivalGrid('nycGrid',     nycBuses);

  const hobokenArrived = hobokenBuses.filter(b => upperArrivals.has(b.num)).length;
  const nycArrived     = nycBuses.filter(b => upperArrivals.has(b.num)).length;
  const totalArrived   = upperArrivals.size;
  const totalBuses     = upperBuses.length;

  document.getElementById('hobokenCount').textContent = `${hobokenArrived} / ${hobokenBuses.length}`;
  document.getElementById('hobokenCount').className   = 'section-count' + (hobokenArrived === hobokenBuses.length ? ' done' : '');
  document.getElementById('nycCount').textContent     = `${nycArrived} / ${nycBuses.length}`;
  document.getElementById('nycCount').className       = 'section-count' + (nycArrived === nycBuses.length ? ' done' : '');
  document.getElementById('upperStatArrived').textContent = totalArrived;
  document.getElementById('upperStatPending').textContent = totalBuses - totalArrived;

  updateOutstandingBadge();
  if (activeTab === 'outstanding') renderOutstanding();
}

function renderArrivalGrid(gridId, busGroup) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = '';
  busGroup.forEach(b => {
    const arrived = upperArrivals.has(b.num);
    const card    = document.createElement('div');
    card.className = 'arrival-card' + (arrived ? ' arrived' : '');
    card.innerHTML = `
      <div class="arrival-num">${b.num}</div>
      <div class="arrival-check">✅</div>
      <div class="arrival-pending">Pending</div>`;
    card.addEventListener('click', () => toggleArrival(b.num));
    card.addEventListener('touchend', e => { e.preventDefault(); toggleArrival(b.num); });
    grid.appendChild(card);
  });
}

function toggleArrival(busNum) {
  if (upperArrivals.has(busNum)) upperArrivals.delete(busNum);
  else upperArrivals.add(busNum);
  renderUpperLot();
  scheduleUpperSave();
  resetUpperPollTimer();
}

function addUpperBus() {
  const num = document.getElementById('addUpperNum').value.trim();
  if (!num) return;
  if (!upperBuses.find(b => b.num === num)) {
    // Determine group: 60-70 = hoboken, 1-8 = nyc, else ask or default hoboken
    const n = parseInt(num);
    const group = (n >= 60 && n <= 70) ? 'hoboken' : (n >= 1 && n <= 8) ? 'nyc' : 'hoboken';
    upperBuses.push({ num, group });
  }
  document.getElementById('addUpperNum').value = '';
  renderUpperLot();
}
document.getElementById('addUpperNum').addEventListener('keydown', e => { if(e.key==='Enter') addUpperBus(); });

// ══════════════════════════════════════════════════════════
// ── OUTSTANDING — Render ──────────────────────────────────
// ══════════════════════════════════════════════════════════
function getOutstandingBuses() {
  const lowerPlaced = new Set(Object.values(assignments));
  // All known buses = union of lower lot buses + upper lot buses
  const allBusNums = new Set([
    ...buses.map(b => b.num),
    ...upperBuses.map(b => b.num),
  ]);
  const outstanding = [];
  allBusNums.forEach(num => {
    const inLower  = lowerPlaced.has(num);
    const inUpper  = upperArrivals.has(num);
    if (!inLower && !inUpper) outstanding.push(num);
  });
  return outstanding.sort((a,b) => parseInt(a) - parseInt(b));
}

function updateOutstandingBadge() {
  const count = getOutstandingBuses().length;
  const badge = document.getElementById('osBadge');
  badge.textContent = count;
  badge.classList.toggle('visible', count > 0);
}

function renderOutstanding() {
  const area        = document.getElementById('outstandingArea');
  const outstanding = getOutstandingBuses();
  area.innerHTML    = '';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'outstanding-header';
  hdr.innerHTML = `
    <div class="outstanding-title">Buses not yet accounted for</div>
    <div class="outstanding-count ${outstanding.length === 0 ? 'clear' : ''}">${outstanding.length === 0 ? '✓ All clear' : outstanding.length + ' outstanding'}</div>`;
  area.appendChild(hdr);

  if (outstanding.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'outstanding-empty';
    empty.innerHTML = `<div class="icon">🎉</div><div>All buses accounted for</div>`;
    area.appendChild(empty);
    return;
  }

  // Group: Lower lot buses (should be in lower)
  const lowerNums   = new Set(buses.map(b => b.num));
  const upperNums   = new Set(upperBuses.map(b => b.num));
  const lowerMissing = outstanding.filter(n => lowerNums.has(n) && !upperNums.has(n));
  const upperMissing = outstanding.filter(n => upperNums.has(n) && !lowerNums.has(n));
  const bothMissing  = outstanding.filter(n => lowerNums.has(n) && upperNums.has(n));
  const otherMissing = outstanding.filter(n => !lowerNums.has(n) && !upperNums.has(n));

  function makeGroup(label, nums) {
    if (!nums.length) return;
    const grp = document.createElement('div');
    grp.className = 'os-group';
    grp.innerHTML = `<div class="os-group-label">${label}</div>`;
    const chips = document.createElement('div');
    chips.className = 'os-chips';
    nums.forEach(num => {
      const chip = document.createElement('div');
      chip.className = 'os-chip';
      chip.innerHTML = `<div class="os-dot"></div>${num}`;
      chips.appendChild(chip);
    });
    grp.appendChild(chips);
    area.appendChild(grp);
  }

  makeGroup('Not placed in Lower Lot', lowerMissing);
  makeGroup('Not checked in Upper Lot', upperMissing);
  makeGroup('Missing from both lots', bothMissing);
  if (otherMissing.length) makeGroup('Other', otherMissing);

  const refresh = document.createElement('div');
  refresh.className = 'os-refresh-label';
  refresh.textContent = 'Auto-refreshes every 30 seconds';
  area.appendChild(refresh);
}

// ══════════════════════════════════════════════════════════
// ── Poll timers ───────────────────────────────────────────
// ══════════════════════════════════════════════════════════
let pollTimer = null;
function resetPollTimer() {
  clearTimeout(pollTimer);
  pollTimer = setTimeout(() => {
    loadFromSheet(false).then(() => {
      updateOutstandingBadge();
      if (activeTab === 'outstanding') renderOutstanding();
    });
  }, 60000);
}

let upperPollTimer = null;
function resetUpperPollTimer() {
  clearTimeout(upperPollTimer);
  upperPollTimer = setTimeout(() => {
    loadUpperFromSheet(false).then(() => {
      updateOutstandingBadge();
      if (activeTab === 'outstanding') renderOutstanding();
    });
  }, 60000);
}

// Outstanding auto-refresh every 30s
setInterval(() => {
  updateOutstandingBadge();
  if (activeTab === 'outstanding') renderOutstanding();
  // Also poll sheets every 30s when on outstanding tab
  if (activeTab === 'outstanding') {
    loadFromSheet(false);
    loadUpperFromSheet(false);
  }
}, 30000);

// ── Init ─────────────────────────────────────────────────
renderGrid();
renderChips();
renderUpperLot();
loadFromSheet(true);
loadUpperFromSheet(true);
resetPollTimer();
resetUpperPollTimer();
updateOutstandingBadge();
</script>
